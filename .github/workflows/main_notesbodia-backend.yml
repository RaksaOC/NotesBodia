# Docs:
# Azure Web Apps Deploy: https://github.com/Azure/webapps-deploy
# GitHub Actions: https://docs.github.com/en/actions

name: Build and deploy NotesBodia mono-repo

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # -------------------------
  # Backend build & deploy
  # -------------------------
  backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Build backend
        run: dotnet build backend/backend.csproj --configuration Release

      - name: Publish backend
        run: dotnet publish backend/backend.csproj -c Release -o ./backend-publish

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-artifact
          path: ./backend-publish

  deploy-backend:
    runs-on: ubuntu-latest
    needs: backend
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Create deploy directory
        run: mkdir -p ./backend-publish

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-artifact
          path: ./backend-publish

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_17DB9533B3884EA790A73FE60D69840A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_BFBE1ECEB0144847A344739501ED3ED5 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_13E16D6DD5CB4B2BAB8E0B7C5213C6A8 }}

      - name: Deploy backend to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: notesbodia-backend
          slot-name: Production
          package: ./backend-publish

